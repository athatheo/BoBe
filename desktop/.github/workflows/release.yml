name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    name: Build & Release DMG
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Python service bundle (CI mode: clone from service repo)
      - name: Build service bundle
        env:
          CI: 'true'
          SERVICE_REPO_URL: ${{ vars.SERVICE_REPO_URL || 'https://github.com/athatheo/ProactiveAI.git' }}
          SERVICE_BRANCH: ${{ vars.SERVICE_BRANCH || 'main' }}
        run: ./packaging/build-service-bundle.sh

      # Desktop build
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm build

      - name: Package with electron-builder
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac --arm64 --publish never

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
          generate_release_notes: true
