name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        type: string
      publish_update:
        description: Publish the Sparkle ZIP and appcast after notarization
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    name: Build, sign, and notarize
    runs-on: macos-latest
    timeout-minutes: 120
    environment: release-signing
    env:
      VERSION: ${{ inputs.version }}
      KEYCHAIN_PATH: ${{ runner.temp }}/release-signing.keychain-db
      CERTIFICATE_PATH: ${{ runner.temp }}/developer-id-application.p12
      APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
      SPARKLE_PRIVATE_KEY_PATH: ${{ runner.temp }}/sparkle-private-key

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install release tools
        run: |
          if ! just --version 2>/dev/null | grep -qx 'just 1.46.0'; then
            cargo install --locked just --version 1.46.0
          fi

      - name: Import signing certificate into a temporary keychain
        env:
          APPLE_CERTIFICATE_P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          pathlib.Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_B64"])
          )
          PY
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Materialize notarization and Sparkle keys
        env:
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY_B64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib

          pathlib.Path(os.environ["APPLE_API_KEY_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_API_KEY_P8_B64"])
          )
          pathlib.Path(os.environ["SPARKLE_PRIVATE_KEY_PATH"]).write_bytes(
              base64.b64decode(os.environ["SPARKLE_PRIVATE_KEY_B64"])
          )
          PY
          chmod 600 "$APPLE_API_KEY_PATH" "$SPARKLE_PRIVATE_KEY_PATH"

      - name: Resolve dependencies
        run: |
          cargo fetch --locked
          (cd desktopMac && swift package resolve)

      - name: Build, sign, notarize, and create Sparkle archive
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          just release version="$VERSION" identity="$APPLE_SIGNING_IDENTITY"
          just notarize-api-key \
            version="$VERSION" \
            key-path="$APPLE_API_KEY_PATH" \
            key-id="$APPLE_API_KEY_ID" \
            issuer="$APPLE_API_ISSUER_ID"
          just staple version="$VERSION"
          just sparkle-zip version="$VERSION"
          just sparkle-sign-update \
            version="$VERSION" \
            private-key-file="$SPARKLE_PRIVATE_KEY_PATH"

      - name: Stage release artifacts
        run: |
          mkdir -p build/release-artifacts
          cp "build/BoBe-$VERSION.dmg" build/release-artifacts/
          cp "build/BoBe-$VERSION.zip" build/release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: signed-release-${{ inputs.version }}
          path: build/release-artifacts/*
          if-no-files-found: error

      - name: Clean up signing material
        if: always()
        run: |
          rm -f "$CERTIFICATE_PATH" "$APPLE_API_KEY_PATH" "$SPARKLE_PRIVATE_KEY_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true

  publish-update:
    name: Publish Sparkle update
    if: ${{ inputs.publish_update }}
    needs: build-sign-notarize
    runs-on: macos-latest
    timeout-minutes: 60
    environment: release-publish
    env:
      VERSION: ${{ inputs.version }}
      UPDATE_DOWNLOAD_URL_PREFIX: https://bobebot.com/updates/macos

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install publish tools
        run: |
          if ! just --version 2>/dev/null | grep -qx 'just 1.46.0'; then
            cargo install --locked just --version 1.46.0
          fi

      - name: Download signed release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: signed-release-${{ inputs.version }}
          path: build/release-artifacts

      - name: Configure publish SSH access
        env:
          UPDATE_HOST: ${{ secrets.UPDATE_HOST }}
          UPDATE_SSH_KEY_B64: ${{ secrets.UPDATE_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64
          import pathlib
          import os

          pathlib.Path.home().joinpath(".ssh", "release-update-key").write_bytes(
              base64.b64decode(os.environ["UPDATE_SSH_KEY_B64"])
          )
          PY
          chmod 600 ~/.ssh/release-update-key
          ssh-keyscan -H "$UPDATE_HOST" >> ~/.ssh/known_hosts

      - name: Resolve Sparkle tools
        run: |
          (cd desktopMac && swift package resolve)

      - name: Regenerate appcast from remote archive history
        env:
          UPDATE_HOST: ${{ secrets.UPDATE_HOST }}
          UPDATE_PATH: ${{ secrets.UPDATE_PATH }}
          UPDATE_USER: ${{ secrets.UPDATE_USER }}
        run: |
          mkdir -p build/remote-updates build/sparkle
          rsync -av \
            -e "ssh -i ~/.ssh/release-update-key" \
            "${UPDATE_USER}@${UPDATE_HOST}:${UPDATE_PATH}/" \
            build/remote-updates/ || true
          find build/remote-updates -maxdepth 1 -name 'BoBe-*.zip' -exec cp {} build/sparkle/ \;
          cp "build/release-artifacts/BoBe-$VERSION.zip" "build/sparkle/BoBe-$VERSION.zip"
          just sparkle-generate-appcast \
            archives_dir=build/sparkle \
            download_url_prefix="$UPDATE_DOWNLOAD_URL_PREFIX"

      - name: Publish Sparkle ZIP and appcast
        env:
          UPDATE_HOST: ${{ secrets.UPDATE_HOST }}
          UPDATE_PATH: ${{ secrets.UPDATE_PATH }}
          UPDATE_USER: ${{ secrets.UPDATE_USER }}
        run: |
          rsync -av \
            -e "ssh -i ~/.ssh/release-update-key" \
            "build/release-artifacts/BoBe-$VERSION.zip" \
            "${UPDATE_USER}@${UPDATE_HOST}:${UPDATE_PATH}/"
          rsync -av \
            -e "ssh -i ~/.ssh/release-update-key" \
            "build/sparkle/appcast.xml" \
            "${UPDATE_USER}@${UPDATE_HOST}:${UPDATE_PATH}/appcast.xml.next"
          ssh -i ~/.ssh/release-update-key \
            "${UPDATE_USER}@${UPDATE_HOST}" \
            "mv '${UPDATE_PATH}/appcast.xml.next' '${UPDATE_PATH}/appcast.xml'"

      - name: Verify published update
        run: |
          curl -fL "$UPDATE_DOWNLOAD_URL_PREFIX/appcast.xml" | head -n 40
          curl -fI "$UPDATE_DOWNLOAD_URL_PREFIX/BoBe-$VERSION.zip"

      - name: Clean up publish key
        if: always()
        run: |
          rm -f ~/.ssh/release-update-key
