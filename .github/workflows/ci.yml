name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust checks
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            BoBeService/target/
          key: v1-cargo-${{ runner.os }}-${{ hashFiles('BoBeService/Cargo.lock') }}
          restore-keys: v1-cargo-${{ runner.os }}-

      - name: Cache CI tool binaries
        id: tool-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cargo/bin/
          key: ci-tools-${{ runner.os }}-deny0.19.0-machete0.9.1

      - name: Install CI tools
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --locked cargo-deny --version 0.19.0
          cargo install --locked cargo-machete --version 0.9.1

      - name: Check formatting
        run: cd BoBeService && cargo fmt --check

      - name: Clippy
        run: cd BoBeService && cargo clippy --locked -q

      - name: Tests
        env:
          CARGO_INCREMENTAL: "0"
        run: cd BoBeService && cargo test --locked -q

      - name: Supply-chain audit
        run: cd BoBeService && cargo deny check

      - name: Unused dependencies
        run: cd BoBeService && cargo machete

  swift-checks:
    name: Swift checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache Swift packages
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: BoBeMacUI/.build
          key: v1-spm-${{ runner.os }}-${{ hashFiles('BoBeMacUI/Package.resolved') }}
          restore-keys: v1-spm-${{ runner.os }}-

      - name: Install SwiftLint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew list swiftlint &>/dev/null || brew install swiftlint
          swiftlint version

      - name: Lint Swift
        run: cd BoBeMacUI && swiftlint lint --quiet

      - name: Build Swift
        run: cd BoBeMacUI && swift build -c debug
