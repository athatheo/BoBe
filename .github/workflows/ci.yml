name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet-and-validate:
    name: Vet and validate
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Cache Rust build artifacts
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            BoBeService/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('BoBeService/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install CI tools
        run: |
          cargo install --locked just --version 1.46.0
          cargo install --locked cargo-deny --version 0.19.0
          cargo install --locked cargo-machete --version 0.9.1
          cargo install --locked cargo-vet --version 0.10.2

      - name: Install SwiftLint
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Run deterministic validation and supply-chain checks
        run: just check-ci
